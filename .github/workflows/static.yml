name: Deploy Static Site with LFS

on:
  push:
    branches: ["master"] # Change to your branch name if it's not main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true # <--- This is the part that fixes the WebM issue

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Change this if your site is in a subfolder like /dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
